name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'

permissions:
  contents: write

jobs:
  bump-and-tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    # Skip if this push was itself a version bump commit (avoids infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    steps:
      - uses: actions/checkout@v5
        with:
          # Use a PAT so the pushed tag triggers downstream workflows
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Bump patch version
        id: bump
        working-directory: relay-client
        run: |
          # Read current version from package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Split into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW"

          # Write back to package.json
          npm version "$NEW" --no-git-tag-version

          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add relay-client/package.json
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag ${{ steps.bump.outputs.tag }}
          git push origin ${{ steps.bump.outputs.tag }}
